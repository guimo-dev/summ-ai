<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="480" height="120">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#a855f7;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0.8" />
    </linearGradient>
  </defs>

  <!-- Icon: audio waveform turning into document lines -->
  <g transform="translate(16, 14)">
    <!-- Rounded background -->
    <rect x="0" y="0" width="92" height="92" rx="20" fill="url(#grad)" />

    <!-- Audio waveform bars (left side) -->
    <rect x="14" y="36" width="5" height="20" rx="2.5" fill="white" opacity="0.9"/>
    <rect x="23" y="24" width="5" height="44" rx="2.5" fill="white" opacity="0.9"/>
    <rect x="32" y="30" width="5" height="32" rx="2.5" fill="white" opacity="0.9"/>
    <rect x="41" y="18" width="5" height="56" rx="2.5" fill="white" opacity="0.9"/>

    <!-- Arrow / transition -->
    <polygon points="52,46 58,40 58,43 64,43 64,49 58,49 58,52" fill="white" opacity="0.7"/>

    <!-- Document lines (right side) -->
    <rect x="66" y="28" width="16" height="3" rx="1.5" fill="white" opacity="0.9"/>
    <rect x="66" y="36" width="12" height="3" rx="1.5" fill="white" opacity="0.7"/>
    <rect x="66" y="44" width="16" height="3" rx="1.5" fill="white" opacity="0.9"/>
    <rect x="66" y="52" width="10" height="3" rx="1.5" fill="white" opacity="0.7"/>
    <rect x="66" y="60" width="14" height="3" rx="1.5" fill="white" opacity="0.9"/>
  </g>

  <!-- Text -->
  <text x="124" y="72" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="52" font-weight="700" fill="#1e1b4b" letter-spacing="-1">
    Summ
  </text>
  <text x="280" y="72" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="52" font-weight="700" fill="url(#grad)" letter-spacing="-1">
    -AI
  </text>

  <!-- Tagline -->
  <text x="126" y="96" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#6b7280" letter-spacing="0.5">
    Local AI meeting notes. No cloud. No compromises.
  </text>
</svg>
